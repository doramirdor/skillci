<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SkillCI — CI for your AI config">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="bacc" x1="120" y1="80" x2="320" y2="260" gradientUnits="userSpaceOnUse">
